# ===============================
# 1. Namespace
# ===============================
apiVersion: v1
kind: Namespace
metadata:
  name: rolex
---
# ===============================
# 2. PVC：MongoDB & RabbitMQ 持久化
#    使用 k3s 默认的 local-path StorageClass
# ===============================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: rolex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # k3s 默认 StorageClass 名字一般是 local-path，不写也可以
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: rolex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
# ===============================
# 3. MongoDB Deployment + Service
# ===============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: rolex
  labels:
    app: mongodb
spec:
  replicas: 1  # 需要副本集时可以改成 StatefulSet
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          args: ["--bind_ip_all"]
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: rolex
spec:
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP
  type: ClusterIP
---
# ===============================
# 4. RabbitMQ Deployment + Service
# ===============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: rolex
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672    # AMQP
            - containerPort: 15672   # 管理界面
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "admin"
            - name: RABBITMQ_DEFAULT_PASS
              value: "admin"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: rolex
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: http
      port: 15672
      targetPort: 15672
  type: ClusterIP
---
# ===============================
# 5. 你的 API Deployment + Service
#    ★ 这里需要你改成自己的镜像和端口
# ===============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: rolex
  labels:
    app: api-server
spec:
  replicas: 1   # 想高可用可以改成 2+
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          # TODO: 换成你的真实镜像地址，如：
          # image: ccr.ccs.tencentyun.com/rolex/api:v1
          # 或：registry.cn-hangzhou.aliyuncs.com/rolex/api:v1
          image: ccr.ccs.tencentyun.com/myrolex/rolex-srv:latest
          imagePullPolicy: IfNotPresent
          # TODO: 修改成你的服务实际监听端口
          ports:
            - containerPort: 8080
          env:
            # 在这里把 Mongo / RabbitMQ 的连接串注入进去
            - name: MONGO_URI
              value: "mongodb://mongodb.rolex.svc.cluster.local:27017"
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq.rolex.svc.cluster.local:5672/"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          # 可以根据需要加 livenessProbe / readinessProbe
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: rolex
spec:
  selector:
    app: api-server
  ports:
    - name: http
      port: 8080      # 集群内访问端口
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# ===============================
# 6. Nginx 网关 ConfigMap（反向代理到 api-server）
# ===============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-conf
  namespace: rolex
data:
  default.conf: |
    upstream api_backend {
        server api-server.rolex.svc.cluster.local:8080;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://api_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
---
# ===============================
# 7. Nginx 网关 Deployment + Service（对外入口）
# ===============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: rolex
  labels:
    app: nginx-gateway
spec:
  replicas: 1   # 想高可用可以改成 2+
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: rolex
spec:
  selector:
    app: nginx-gateway
  type: NodePort   # 在腾讯轻量 / k3s 上最简单的对外方式
  ports:
    - name: http
      port: 80          # 集群内端口
      targetPort: 80    # Pod 内 nginx 端口
      nodePort: 30080   # 对外端口：http://<服务器IP>:30080
